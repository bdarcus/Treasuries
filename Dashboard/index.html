<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Treasuries Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box}
body{font-family:system-ui,sans-serif;font-size:13px;margin:0;background:#f1f5f9;color:#0f172a;overflow:hidden;height:100vh;display:flex;flex-direction:column}

/* ── Header ── */
#hdr{display:flex;align-items:center;gap:10px;padding:8px 14px;background:#1e293b;color:#f8fafc;flex-shrink:0}
#hdr h1{font-size:15px;margin:0;font-weight:700;letter-spacing:.02em}
#hdr-sub{font-size:11px;color:#94a3b8}
#hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
#fetched-at{font-size:11px;color:#94a3b8}
.hdr-btn{font-size:11px;padding:3px 9px;border-radius:4px;border:1px solid #475569;background:transparent;color:#cbd5e1;cursor:pointer}
.hdr-btn:hover{background:#334155}

/* ── Main layout ── */
#main{display:flex;flex:1;overflow:hidden}
#dfd-container{flex:1;overflow:auto;padding:10px;position:relative}
#side-panel{width:360px;flex-shrink:0;background:#fff;border-left:1px solid #e2e8f0;display:flex;flex-direction:column;transform:translateX(360px);transition:transform .18s ease;overflow:hidden}
#side-panel.open{transform:translateX(0)}
#panel-hdr{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #e2e8f0;gap:8px;flex-shrink:0}
#panel-type-badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:2px 6px;border-radius:3px;flex-shrink:0}
#panel-title{font-size:13px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#panel-close{background:none;border:none;cursor:pointer;font-size:16px;color:#64748b;padding:0 2px;line-height:1}
#panel-close:hover{color:#0f172a}
#panel-body{flex:1;overflow-y:auto;padding:12px 14px}

/* ── Drill-down overlay ── */
#drill-view{position:fixed;inset:0;background:#f1f5f9;z-index:20;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .2s ease}
#drill-view.open{transform:translateY(0)}
#drill-nav{display:flex;align-items:center;gap:10px;padding:8px 14px;background:#1e293b;flex-shrink:0}
#drill-back{background:none;border:1px solid #475569;color:#cbd5e1;cursor:pointer;padding:3px 10px;border-radius:4px;font-size:12px}
#drill-back:hover{background:#334155}
#drill-breadcrumb{font-size:12px;color:#94a3b8}
#drill-body{flex:1;overflow-y:auto;padding:16px}

/* ── SVG node styles ── */
.node{cursor:pointer}
.node:hover .node-hit{opacity:.12}
.node-hit{fill:#6366f1;opacity:0;transition:opacity .1s}
.node.selected .node-body-ext{stroke:#1d4ed8!important;stroke-width:2.5!important}
.node.selected .node-body-proc{stroke:#6d28d9!important;stroke-width:2.5!important}
.node.selected .node-body-store{stroke:#15803d!important;stroke-width:2.5!important}
.node.selected .node-body-app{stroke:#c2410c!important;stroke-width:2.5!important}

/* ── Edge styles ── */
.edge{cursor:pointer}
.edge-hit{stroke:transparent;stroke-width:10;fill:none}
.edge-line{fill:none;stroke:#64748b;stroke-width:1.5;marker-end:url(#arr)}
.edge-line.dashed{stroke:#94a3b8;stroke-dasharray:5,3;marker-end:url(#arr-d)}
.edge:hover .edge-line{stroke:#3b82f6}
.edge:hover .edge-line.dashed{stroke:#60a5fa}
.edge.selected .edge-line{stroke:#2563eb;stroke-width:2}

/* ── Status dots ── */
.status-dot{pointer-events:none}
/* ── Status tooltip ── */
#status-tip{position:fixed;background:#1e293b;color:#f8fafc;border-radius:7px;padding:10px 13px;font-size:11px;line-height:1.7;z-index:50;max-width:260px;box-shadow:0 4px 16px rgba(0,0,0,.25);display:none}
#status-tip.visible{display:block}
#status-tip .tip-row{display:flex;align-items:center;gap:7px}
#status-tip .tip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#status-tip .tip-label{font-weight:700;margin-bottom:6px;font-size:12px}

/* ── Legend ── */
#legend{position:absolute;bottom:12px;right:12px;background:rgba(255,255,255,.9);border:1px solid #e2e8f0;border-radius:6px;padding:8px 12px;font-size:10px;line-height:1.8}
#legend b{display:block;font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:#475569;margin-bottom:4px}
.leg-row{display:flex;align-items:center;gap:6px}
.leg-shape{width:20px;height:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── Panel / Drill content ── */
.pi-section{margin-bottom:14px}
.pi-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#64748b;margin-bottom:6px}
.pi-value{font-size:12px;color:#1e293b}
.pi-value a{color:#2563eb;text-decoration:none}
.pi-value a:hover{text-decoration:underline}
.pi-mono{font-family:Consolas,Menlo,monospace;font-size:11px;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:4px;padding:4px 8px;color:#334155;word-break:break-all}
.pi-links{display:flex;flex-wrap:wrap;gap:6px}
.pi-btn{font-size:11px;padding:4px 10px;border-radius:4px;border:1px solid #cbd5e1;background:#f8fafc;cursor:pointer;text-decoration:none;color:#1e293b;display:inline-block}
.pi-btn:hover{background:#e2e8f0}
.pi-btn.primary{background:#1e40af;color:#fff;border-color:#1e40af}
.pi-btn.primary:hover{background:#1e3a8a}
.pi-btn.run{background:#16a34a;color:#fff;border-color:#16a34a}
.pi-btn.run:hover{background:#15803d}
.pi-btn.run:disabled{background:#94a3b8;border-color:#94a3b8;cursor:not-allowed}

/* ── Workflow chip ── */
.wf-chip{border:1px solid #e2e8f0;border-radius:6px;padding:7px 10px;margin-bottom:8px;font-size:11px}
.wf-chip-top{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.wf-label{font-weight:700;flex:1}
.wf-dot{width:8px;height:8px;border-radius:50%;background:#cbd5e1;flex-shrink:0}
.wf-dot.fresh{background:#22c55e}.wf-dot.stale{background:#f59e0b}.wf-dot.error{background:#ef4444}
.wf-meta{color:#64748b;font-size:10px;display:flex;flex-wrap:wrap;gap:4px 10px}
.wf-actions{display:flex;gap:6px;margin-top:6px}

/* ── Pipeline rows (in drill-down) ── */
.drill-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pipe-card{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:12px}
.pipe-card-title{font-size:12px;font-weight:700;margin-bottom:8px}
.pipe-row{padding:5px 0;border-top:1px solid #f1f5f9;font-size:11px}
.pipe-row:first-child{border-top:none;padding-top:0}
.pipe-row-hdr{display:flex;align-items:center;gap:5px}
.pipe-lbl{font-weight:600;color:#1e293b;flex:1}
.pipe-age{font-weight:600;white-space:nowrap}
.pipe-age.fresh{color:#16a34a}.pipe-age.stale{color:#d97706}.pipe-age.old{color:#dc2626}.pipe-age.na{color:#94a3b8;font-weight:400}

/* ── Preview block ── */
.preview-wrap{margin-top:8px;background:#0f172a;border-radius:4px;padding:7px 10px;overflow-x:auto}
.preview-pre{margin:0;font-family:Consolas,Menlo,monospace;font-size:10px;line-height:1.5;color:#cbd5e1;white-space:pre;width:max-content}
.preview-footer{font-size:9px;color:#64748b;margin-top:4px}

/* ── SSE log ── */
.run-log{margin-top:8px;background:#0f172a;border-radius:4px;padding:7px 10px;max-height:160px;overflow-y:auto}
.run-log pre{margin:0;font-family:Consolas,Menlo,monospace;font-size:10px;line-height:1.5;color:#a3e635;white-space:pre-wrap}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
</style>
</head>
<body>

<div id="hdr">
  <h1>Treasuries Dashboard</h1>
  <span id="hdr-sub">System Map</span>
  <div id="hdr-right">

      <div class="leg-row"><div class="leg-shape"><svg width="20" height="14"><circle cx="10" cy="7" r="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.2"/></svg></div>Process / script</div>
      <div class="leg-row"><div class="leg-shape"><svg width="20" height="14"><ellipse cx="10" cy="4" rx="8" ry="3" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><rect x="2" y="4" width="16" height="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/><ellipse cx="10" cy="10" rx="8" ry="3" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/></svg></div>Data store (R2)</div>

      <div class="leg-row"><div class="leg-shape"><svg width="20" height="2"><line x1="0" y1="1" x2="20" y2="1" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2"/></svg></div>Dependency / live</div>
    </div>

  <div id="side-panel">
    <div id="panel-hdr">
      <span id="panel-type-badge"></span>

</div>

<div id="status-tip"></div>
<div id="drill-view">
  <div id="drill-nav">
    <button id="drill-back">← DFD</button>
    <span id="drill-breadcrumb"></span>
  </div>
  <div id="drill-body"></div>
</div>

const APPID_TO_NODE = {'yieldcurves':'A1','tipsladder':'A2','auctions':'A4','yieldsmonitor':'A3'};

// \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501
// SVG RENDERING
// \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501
const SVG_NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs={}, ...children){
  const e = document.createElementNS(SVG_NS, tag);
  for(const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  for(const c of children) if(c) e.appendChild(c);
  return e;
}

function ptFor(node, side){
  const {type,cx,cy} = node;
  if(type==='external'){
    if(side==='right') return [cx+52,cy];
    if(side==='left')  return [cx-52,cy];
    if(side==='top')   return [cx,cy-18];
    return [cx,cy+18];
  }
  if(type==='process'){
    const r=30;
    if(side==='right') return [cx+r,cy];
    if(side==='left')  return [cx-r,cy];
    if(side==='top')   return [cx,cy-r];
    return [cx,cy+r];
  }
  if(type==='store'){
    if(side==='right') return [cx+46,cy];
    if(side==='left')  return [cx-46,cy];
    if(side==='top')   return [cx,cy-24];
    return [cx,cy+24];
  }
  if(type==='app'){
    if(side==='right') return [cx+33,cy];
    if(side==='left')  return [cx-33,cy];
    if(side==='top')   return [cx,cy-30];
    return [cx,cy+30];
  }
  return [cx,cy];
}

function edgePath(edge){
  const fn=nodeMap[edge.from], tn=nodeMap[edge.to];
  // special backward / long-range routes
  if(edge.id==='eS2P1'){
    // TipsRef(468,280) \u2192 P1(265,65): route through top-left corridor
    return `M 422,268 C 380,230 340,95 295,65`;
  }
  if(edge.id==='eS6P6'){
    // self-read: S6(468,575) \u2192 P6(265,575): same y, curve above
    return `M 422,563 C 385,542 310,542 295,563`;
  }
  if(edge.id==='eE5A3'){
    // live fetch: E5(82,575) \u2192 A3(672,610): arc below all nodes
    return `M 82,593 C 200,875 560,875 639,628`;
  }
  if(edge.id==='eE3A4'){
    // live fetch: E3(82,385) \u2192 A4(672,480): arc below all nodes
    return `M 82,403 C 200,865 560,865 639,495`;
  }
  if(edge.id==='eS7aA1'){
    // FidelityTreasuries(468,660) \u2192 A1(672,175): arc up right side
    return `M 514,650 C 620,480 650,280 639,205`;
  }
  if(edge.id==='eS7bA1'){
    // FidelityTips(468,725) \u2192 A1(672,175): arc up right side
    return `M 514,715 C 630,500 655,285 639,205`;
  }
  if(edge.id==='eS8A1'){
    // BondHolidaysSifma(468,815) \u2192 A1(672,175): arc up right side
    return `M 514,805 C 645,600 660,300 639,205`;
  }
  // normal left-to-right
  const [x1,y1] = ptFor(fn, fn.cx<tn.cx?'right':'left');
  const [x2,y2] = ptFor(tn, fn.cx<tn.cx?'left':'right');
  const dx = Math.abs(x2-x1)*0.38;
  return `M ${x1},${y1} C ${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`;
}

function drawNode(svg, node){
  const g = el('g',{class:`node node-${node.type}`,'data-id':node.id});
  g.addEventListener('click', e=>{ e.stopPropagation(); if(e.target.getAttribute('data-dot-hit')) showStatusTip(node.id,e); else onNodeClick(node.id); });

  if(node.type==='external'){
    g.appendChild(el('rect',{class:'node-body-ext',x:node.cx-52,y:node.cy-18,width:104,height:36,rx:4,fill:'#dbeafe',stroke:'#3b82f6','stroke-width':'1.5'}));
    g.appendChild(el('rect',{class:'node-hit',x:node.cx-52,y:node.cy-18,width:104,height:36,rx:4}));
  } else if(node.type==='process'){
    g.appendChild(el('circle',{class:'node-body-proc',cx:node.cx,cy:node.cy,r:30,fill:'#ede9fe',stroke:'#7c3aed','stroke-width':'1.5'}));
    g.appendChild(el('circle',{class:'node-hit',cx:node.cx,cy:node.cy,r:30}));
  } else if(node.type==='store'){
    const [cx,cy]=[node.cx,node.cy];
    const cyl = el('g',{class:'node-body-store'});
    cyl.appendChild(el('rect',{x:cx-46,y:cy-15,width:92,height:30,fill:'#dcfce7',stroke:'#16a34a','stroke-width':'1.5'}));
    cyl.appendChild(el('ellipse',{cx,cy:cy-15,rx:46,ry:9,fill:'#bbf7d0',stroke:'#16a34a','stroke-width':'1.5'}));
    cyl.appendChild(el('ellipse',{cx,cy:cy+15,rx:46,ry:9,fill:'#dcfce7',stroke:'#16a34a','stroke-width':'1.5'}));
    g.appendChild(cyl);
    g.appendChild(el('rect',{class:'node-hit',x:cx-46,y:cy-24,width:92,height:48,rx:2}));
  } else if(node.type==='app'){
    const [cx,cy]=[node.cx,node.cy];
    g.appendChild(el('polygon',{class:'node-body-app',points:`${cx},${cy-30} ${cx+33},${cy} ${cx},${cy+30} ${cx-33},${cy}`,fill:'#ffedd5',stroke:'#ea580c','stroke-width':'1.5'}));
    g.appendChild(el('polygon',{class:'node-hit',points:`${cx},${cy-30} ${cx+33},${cy} ${cx},${cy+30} ${cx-33},${cy}`}));
  }

  // Label text \u2014 handle two-line labels
  const lines = (node.short || node.label).split('\n');
  const fontSize = node.type==='process'?9:10;
  if(lines.length===2){
    const t1=el('text',{x:node.cx,y:node.cy-4,fill:'#1e293b','text-anchor':'middle','font-size':fontSize,'font-weight':'600','pointer-events':'none'});
    t1.textContent=lines[0];
    const t2=el('text',{x:node.cx,y:node.cy+7,fill:'#1e293b','text-anchor':'middle','font-size':fontSize,'font-weight':'600','pointer-events':'none'});
    t2.textContent=lines[1];
    g.appendChild(t1); g.appendChild(t2);
  } else {
    const t=el('text',{x:node.cx,y:node.cy+4,fill:'#1e293b','text-anchor':'middle','font-size':fontSize,'font-weight':'600','pointer-events':'none'});
    t.textContent=lines[0];
    g.appendChild(t);
  }

  // Sub-label (id badge) below the node
  const subY = node.type==='process'?node.cy+42 : node.type==='store'?node.cy+34 : node.type==='app'?node.cy+38 : node.cy+26;
  const sub = el('text',{x:node.cx,y:subY,fill:'#94a3b8','text-anchor':'middle','font-size':8,'pointer-events':'none'});
  sub.textContent=node.sub;
  g.appendChild(sub);

  // Status dot \u2014 visible circle + larger invisible hit target
  const dotX = node.type==='store'?node.cx+50 : node.cx+32;
  const dotY = node.cy-22;
  const dot = el('circle',{class:'status-dot','data-dot':node.id,cx:dotX,cy:dotY,r:5,fill:'transparent'});
  const dotHit = el('circle',{cx:dotX,cy:dotY,r:10,fill:'#ffffff','fill-opacity':'0.01','data-dot-hit':'1',style:'cursor:pointer'});
  g.appendChild(dot);
  g.appendChild(dotHit);

  svg.appendChild(g);
}

function drawEdge(svg, edge){
  const g = el('g',{class:`edge`,'data-id':edge.id});
  g.addEventListener('click', e=>{ e.stopPropagation(); onEdgeClick(edge.id); });
  const path = edgePath(edge);
  const line = el('path',{class:`edge-line${edge.style==='dashed'?' dashed':''}`,d:path});
  const hit  = el('path',{class:'edge-hit',d:path});
  g.appendChild(line);
  g.appendChild(hit);
  svg.appendChild(g);
}

// STATUS LOADING
// \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501
async function loadStatus(){
  document.getElementById('fetched-at').textContent='Fetching\u2026';
  try{
    const r = await fetch('/api/status');
    statusData = await r.json();
    document.getElementById('fetched-at').textContent='Updated '+fmtAge(statusData.fetchedAt);
    applyStatusDots();
    // Re-render open drill panel so last-run info reflects fresh data
    const drillView = document.getElementById('drill-view');
    if(drillView.classList.contains('open') && selectedId){
      const node = nodeMap[selectedId];
      if(node) openDrill(node);
    }
  }catch(e){
    document.getElementById('fetched-at').textContent='Status unavailable';
  }
}

function applyStatusDots(){
  if(!statusData) return;
  const nodeStatus={};
  for(const app of statusData.apps){
    const appNode = APPID_TO_NODE[app.id];
    // Recompute app status locally \u2014 weekday-aware (same as tooltip)
    let appStatus='fresh';
    for(const p of app.pipelines){
      const s=pipelineStatus(p);
      if(s==='error'){ appStatus='error'; break; }
      if(s==='stale'&&appStatus!=='error') appStatus='stale';
    }
    if(appNode) nodeStatus[appNode]=appStatus;
    for(const p of app.pipelines){
      // local jobs \u2192 process node
      for(const lj of p.localJobs||[]){
        const pNode = NODES.find(n=>n.localJobId===lj.id)?.id;
        if(pNode) nodeStatus[pNode] = lj.lastExitCode===0 ? 'fresh' : 'error';
      }
      // r2 key \u2192 store node
      if(p.r2Key){
        const sNode = R2_TO_NODE[p.r2Key];
        if(sNode){
          const cur = nodeStatus[sNode];
          const next = pipelineStatus(p);
          nodeStatus[sNode] = mergeStatus(cur, next);
        }
      }
    }
  }
  for(const [id, status] of Object.entries(nodeStatus)){
    const dot = document.querySelector(`[data-dot="${id}"]`);
    if(dot){
      const color = status==='fresh'?'#22c55e':status==='stale'?'#f59e0b':status==='error'?'#ef4444':'#94a3b8';
      dot.setAttribute('fill',color);
    }
  }
}

function weekendHoursElapsed(iso){
  if(!iso) return 0;
  let extra=0;
  const d=new Date(iso);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate()+1);
  const now=new Date();
  while(d<=now){ const day=d.getDay(); if(day===0||day===6) extra+=24; d.setDate(d.getDate()+1); }
  return extra;
}

function pipelineStatus(p){
  if(!p.r2||!p.stalenessHours) return null;
  if(p.r2.status==='error') return 'error';
  if(!p.r2.lastModified) return null;
  const hrs = (Date.now()-new Date(p.r2.lastModified))/3600000;
  const threshold = p.stalenessHours+(p.weekdayOnly?weekendHoursElapsed(p.r2.lastModified):0);
  return hrs<=threshold?'fresh':'stale';
}
function mergeStatus(a,b){
  const rank={error:0,stale:1,fresh:2,null:3};
  const ra=rank[a]??3, rb=rank[b]??3;
  return ra<rb?a:b;
}

// PANEL / DRILL INTERACTIONS
// \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501
function setSelected(id){
  document.querySelectorAll('.node.selected,.edge.selected').forEach(e=>e.classList.remove('selected'));
  if(id){
    const el=document.querySelector(`[data-id="${id}"]`);
    if(el) el.classList.add('selected');
  }
  selectedId=id;
}

function onNodeClick(id){
  const node = nodeMap[id];
  if(!node) return;
  setSelected(id);
  if(node.type==='process'||node.type==='app'){
    openDrill(node);
  } else {
    openPanel(node);
  }
}

function onEdgeClick(id){
  const edge = EDGES.find(e=>e.id===id);
  if(!edge) return;
  setSelected(id);
  openEdgePanel(edge);
}

const BADGE_COLORS = {
  external:['#dbeafe','#1d4ed8'],
  process: ['#ede9fe','#6d28d9'],
  store:   ['#dcfce7','#15803d'],
  app:     ['#ffedd5','#c2410c'],
  edge:    ['#f1f5f9','#475569'],

function openPanel(node){
  const badge = document.getElementById('panel-type-badge');
  const [bg,fg]=BADGE_COLORS[node.type]||BADGE_COLORS.edge;
  badge.style.cssText=`background:${bg};color:${fg}`;
  badge.textContent = {external:'Source',store:'Data Store',app:'App',process:'Process'}[node.type]||node.type;
  document.getElementById('panel-title').textContent = node.label;
  document.getElementById('panel-body').innerHTML = buildNodePanel(node);
  document.getElementById('side-panel').classList.add('open');
  // wire preview buttons
  document.querySelectorAll('[data-preview-key]').forEach(btn=>{
    btn.addEventListener('click', ()=> loadPreview(btn.dataset.previewKey, btn.parentElement.nextElementSibling));
  });
}

function buildNodePanel(node){
  if(node.type==='external') return `
    <div class="pi-section">
      <div class="pi-label">Description</div>
      <div class="pi-value">${node.desc}</div>
    </div>
    <div class="pi-section">
      <div class="pi-label">URL</div>
      <div class="pi-mono"><a href="${node.url}" target="_blank">${node.url}</a></div>
    </div>
    <div class="pi-section">
      <div class="pi-label">Consumed by processes</div>
      <div class="pi-value">${EDGES.filter(e=>e.from===node.id&&nodeMap[e.to]?.type==='process').map(e=>`<code>${nodeMap[e.to].label}</code>`).join(', ')||'\u2014'}</div>
    </div>`;

  if(node.type==='store'){
    const pipelineInfo = getStorePipelineInfo(node);
    return `
    <div class="pi-section">
      <div class="pi-label">R2 Key</div>
      <div class="pi-mono">${node.r2Key}</div>
    </div>
    <div class="pi-section">
      <div class="pi-label">Schema</div>
      <div class="pi-mono">${node.schema}</div>
    </div>
    ${node.r2Note?`<div class="pi-section"><div class="pi-label">Note</div><div class="pi-value">${node.r2Note}</div></div>`:''}
    ${pipelineInfo}
    <div class="pi-section">
      <div class="pi-label">File Preview</div>
      <div class="pi-links"><button class="pi-btn" data-preview-key="${node.r2Key}">Load Preview</button>
      <a class="pi-btn" href="${R2_BASE}/${node.r2Key}" target="_blank">View Full \u2197</a></div>
      <div class="preview-container"></div>
    </div>`;
  }
  return '';
}

function getStorePipelineInfo(node){
  if(!statusData) return '';
  // find the r2 status for this node's key
  let r2=null;
  for(const app of statusData.apps){
    for(const p of app.pipelines){
      if(p.r2Key===node.r2Key && p.r2){ r2=p.r2; break; }
    }
    if(r2) break;
  }
  if(!r2) return '';
  const age = r2.lastModified?fmtAge(r2.lastModified):'unknown';
  const cls = r2.status==='error'?'old':age.includes('m ')||age.includes('h ')?'stale':'fresh';
  return `<div class="pi-section">
    <div class="pi-label">Freshness</div>
    <div class="pi-value"><span class="pipe-age ${cls}">${age}</span></div>
  </div>`;
}

async function loadPreview(r2Key, container){
  container.innerHTML='<div style="font-size:11px;color:#94a3b8;margin-top:6px">Loading\u2026</div>';
  try{
    const r = await fetch(`/api/preview?source=r2&key=${encodeURIComponent(r2Key)}&lines=12`);
    const d = await r.json();
    container.innerHTML=`<div class="preview-wrap"><pre class="preview-pre">${esc(d.lines.join('\n'))}</pre></div>
      <div class="preview-footer">${d.total?`${d.lines.length} of ${d.total} lines`:'preview'}</div>`;
  }catch(e){
    container.innerHTML=`<div style="font-size:11px;color:#ef4444;margin-top:6px">Error: ${e.message}</div>`;
  }
}

function openEdgePanel(edge){
  const badge=document.getElementById('panel-type-badge');

  document.getElementById('side-panel').classList.add('open');
  // wire run buttons
  document.querySelectorAll('[data-run-job]').forEach(btn=>{
    btn.addEventListener('click',()=>runJob(btn.dataset.runJob, btn));
  });

function buildEdgePanel(edge){
  const from=nodeMap[edge.from], to=nodeMap[edge.to];
  let html=`<div class="pi-section">
    <div class="pi-label">Data transferred</div>
    <div class="pi-value">${edge.desc}</div>
  </div>
  <div class="pi-section">
    <div class="pi-label">Flow type</div>
    <div class="pi-value">${edge.style==='dashed'?'Dependency / live browser fetch':'Primary pipeline flow'}</div>
  </div>`;

  // find the process that drives this edge
  const procNode = from.type==='process'?from : to.type==='process'?to : null;
  const procInfo = procNode?getProcessChipHtml(procNode):'';
  if(procInfo) html+=`<div class="pi-section"><div class="pi-label">Triggered by</div>${procInfo}</div>`;
  return html;
}

function getProcessChipHtml(pNode){
  let html='';
  if(pNode.localJobId&&statusData){
    const job=findLocalJob(pNode.localJobId);
    if(job) html+=renderLocalJobChip(job);
  }
  return html;
}

function findLocalJob(jobId){
  if(!statusData) return null;
  for(const app of statusData.apps)
    for(const p of app.pipelines)
      for(const lj of p.localJobs||[])
        if(lj.id===jobId) return lj;
  return null;
}

function renderLocalJobChip(job){
  const nextRun=job.nextRunAt?'next '+fmtRelTime(job.nextRunAt):'';
  let lastRunHtml='';
  if(job.lastRunAt){
    const ok=job.lastExitCode===0;
    const dot=ok?'#22c55e':'#ef4444';
    const label=ok?'OK':'Failed (code '+job.lastExitCode+')';
    lastRunHtml=`<div class="wf-meta" style="gap:5px"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${dot};flex-shrink:0"></span><span>Last run ${fmtAge(job.lastRunAt)} \u2014 ${label}</span></div>`;
  }
  return `<div class="wf-chip">
    <div class="wf-chip-top">
      <div class="wf-dot"></div>
      <div class="wf-label">${job.label}</div>
    </div>
    ${lastRunHtml}
    ${nextRun?`<div class="wf-meta"><span>${nextRun}</span></div>`:''}
    <div class="wf-actions">
      <button class="pi-btn run" data-run-job="${job.id}">\u25b6 Run locally</button>
    </div>
  </div>`;
}

function closePanel(){
  document.getElementById('side-panel').classList.remove('open');
  setSelected(null);
}

// \u2500\u2014 Drill-down \u2500\u2014
function openDrill(node){
  document.getElementById('drill-breadcrumb').textContent=node.label;
  document.getElementById('drill-body').innerHTML='';
  if(node.type==='app') buildAppDrill(node);
  else if(node.type==='process') buildProcessDrill(node);
  document.getElementById('drill-view').classList.add('open');
  // wire buttons
  document.querySelectorAll('[data-run-job]').forEach(btn=>btn.addEventListener('click',()=>runJob(btn.dataset.runJob,btn)));
  document.querySelectorAll('[data-preview-key]').forEach(btn=>{
    btn.addEventListener('click',()=>loadPreview(btn.dataset.previewKey,btn.parentElement.nextElementSibling));
  });
}

function buildAppDrill(node){
  const body=document.getElementById('drill-body');
  const app = statusData?.apps.find(a=>a.id===node.appId);
  let html=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
    <div>
      <div style="font-size:16px;font-weight:800">${node.label}</div>
      <div style="font-size:12px;color:#475569;margin-top:2px">${node.desc}</div>
    </div>
    <a class="pi-btn primary" href="${node.url}" target="_blank" style="margin-left:auto">Open App \u2197</a>
  </div>`;
  if(app){
    html+=`<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#64748b;margin-bottom:8px">Pipelines</div>`;
    html+=`<div style="display:flex;flex-direction:column;gap:10px">`;
    for(const p of app.pipelines){
      html+=buildPipelineRow(p);
    }
    html+='</div>';
  } else {
    html+='<div style="color:#94a3b8;font-size:12px">Status data not available \u2014 server may be loading</div>';
  }
  body.innerHTML=html;
}

function buildPipelineRow(p){
  const r2Age = p.r2?.lastModified?fmtAge(p.r2.lastModified):null;
  const ageClass = !r2Age?'na': r2Age.includes('d ')||r2Age.includes('w ')?'old': r2Age.includes('h ')&&parseInt(r2Age)>12?'stale':'fresh';
  let html=`<div class="pipe-card">
    <div class="pipe-card-title">${p.label} <span style="font-weight:400;color:#64748b;font-size:10px">\u2192 ${p.feeds}</span></div>`;

  if(p.liveNote){
    html+=`<div style="font-size:11px;color:#0369a1;margin-bottom:6px">\u2b24 ${p.liveNote}</div>`;
  } else if(p.r2){
    html+=`<div class="pipe-row"><div class="pipe-row-hdr">
      <span class="pipe-lbl">${p.r2.shortName||p.r2Key}</span>
      <span class="pipe-age ${ageClass}">${r2Age||'\u2014'}</span>
    </div>
    ${p.r2Note?`<div style="font-size:10px;color:#94a3b8;margin-top:2px">${p.r2Note}</div>`:''}
    <div style="margin-top:4px"><button class="pi-btn" style="font-size:10px" data-preview-key="${p.r2Key}">Preview</button>
    <a class="pi-btn" style="font-size:10px" href="${R2_BASE}/${p.r2Key}" target="_blank">View \u2197</a></div>
    <div class="preview-container"></div>
    </div>`;
  }

  for(const lj of p.localJobs||[])   html+=renderLocalJobChip(lj);
  if(p.alsoUsedBy?.length) html+=`<div style="font-size:10px;color:#64748b;margin-top:4px">Also used by: ${p.alsoUsedBy.join(', ')}</div>`;

  html+='</div>';
  return html;
}

function buildProcessDrill(node){
  const body=document.getElementById('drill-body');
  const lj=node.localJobId?findLocalJob(node.localJobId):null;

  let html=`<div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:16px">
    <div>
      <div style="font-size:16px;font-weight:800">${node.label}</div>
      <div style="font-size:11px;color:#475569;margin-top:3px">Process ${node.sub}</div>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div>
      <div class="pi-label" style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#64748b;margin-bottom:8px">Script</div>
      <div class="pi-mono" style="margin-bottom:8px">${node.script}</div>
      <div class="pi-links">
        <a class="pi-btn" href="${GH_BASE}/${node.script}" target="_blank">View Script \u2197</a>
      </div>
    </div>
    <div>
      <div class="pi-label" style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#64748b;margin-bottom:8px">Local Job Status & Controls</div>
      ${lj?renderLocalJobChip(lj):'<div style="font-size:11px;color:#94a3b8">No local job defined</div>'}
    </div>
  </div>
  <div style="margin-top:16px">
    <div class="pi-label" style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#64748b;margin-bottom:8px">Data Flows</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:8px 12px;font-size:11px">
        <div style="font-weight:700;margin-bottom:4px;color:#475569">Reads</div>
        ${node.reads.map(id=>`<div style="color:#1e293b">\u2190 ${nodeMap[id]?.label||id}</div>`).join('')}
      </div>
      <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:8px 12px;font-size:11px">
        <div style="font-weight:700;margin-bottom:4px;color:#475569">Writes</div>
        ${node.writes.map(id=>`<div style="color:#1e293b">\u2192 ${nodeMap[id]?.label||id}</div>`).join('')}
      </div>
    </div>
  </div>`;

  body.innerHTML=html;
}

function closeDrill(){
  document.getElementById('drill-view').classList.remove('open');
  setSelected(null);
}

// \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501
// JOB EXECUTION
// \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501
async function runJob(jobId, btn){
  btn.disabled=true; btn.textContent='Running\u2026';
  let logEl=btn.closest('.wf-chip')?.querySelector('.run-log');
  if(!logEl){
    logEl=document.createElement('div');
    logEl.className='run-log';
    logEl.innerHTML='<pre></pre>';
    btn.closest('.wf-chip')?.appendChild(logEl);
  }
  const pre=logEl.querySelector('pre');
  pre.textContent='';
  try{
    const es=new EventSource(`/api/run/${encodeURIComponent(jobId)}`);
    es.onmessage=e=>{
      const {type,text}=JSON.parse(e.data);
      pre.textContent+=text;
      logEl.scrollTop=logEl.scrollHeight;
      if(type==='exit'){ es.close(); btn.disabled=false; btn.textContent='\u25b6 Run locally'; loadStatus(); }
    };
    es.onerror=()=>{ es.close(); btn.disabled=false; btn.textContent='\u25b6 Run locally'; };
  }catch(e){ btn.disabled=false; btn.textContent='\u25b6 Run locally'; }
}

// \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501
// UTILITIES
// \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501
function fmtAge(iso){
  const ms=Date.now()-new Date(iso);
  const h=ms/3600000, m=ms/60000;
  if(m<2)   return 'just now';
  if(m<60)  return Math.floor(m)+'m ago';
  if(h<24)  return Math.floor(h)+'h ago';
  if(h<168) return Math.floor(h/24)+'d ago';
  return Math.floor(h/168)+'w ago';
}
function fmtRelTime(iso){
  const ms=new Date(iso)-Date.now();
  if(ms<0) return 'overdue';
  const h=ms/3600000, m=ms/60000;
  if(m<60)  return 'in '+Math.floor(m)+'m';
  if(h<24)  return 'in '+Math.floor(h)+'h';
  return 'in '+Math.floor(h/24)+'d';
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501
// STATUS TOOLTIP
// \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501
function showStatusTip(nodeId, evt){
  const tip = document.getElementById('status-tip');
  const node = nodeMap[nodeId];
  if(!node){ return; }
  if(!statusData){
    tip.innerHTML=`<div class="tip-label">${node.label}</div><div class="tip-row"><div class="tip-dot" style="background:#64748b"></div><span>Status not loaded \u2014 try Refresh</span></div>`;
    tip.style.left=Math.min(evt.clientX+12,window.innerWidth-280)+'px';
    tip.style.top=(evt.clientY-10)+'px';
    tip.classList.add('visible');
    return;
  }

  const lines = buildStatusLines(node);
  tip.innerHTML = `<div class="tip-label">${node.label} \u2014 status</div>` +
    lines.map(({text,status})=>{
      const c = status==='fresh'?'#22c55e':status==='stale'?'#f59e0b':status==='error'?'#ef4444':'#64748b';
      return `<div class="tip-row"><div class="tip-dot" style="background:${c}"></div><span>${text}</span></div>`;
    }).join('');

  tip.style.left = Math.min(evt.clientX+12, window.innerWidth-280)+'px';
  tip.style.top  = (evt.clientY-10)+'px';
  tip.classList.add('visible');
}

function buildStatusLines(node){
  const lines=[];
  if(node.type==='app'){
    const app = statusData.apps.find(a=>APPID_TO_NODE[a.id]===node.id);
    if(!app) return [{text:'No data',status:'unknown'}];
    for(const p of app.pipelines){
      const s = pipelineStatus(p);
      const age = p.r2?.lastModified ? fmtAge(p.r2.lastModified) : null;
      if(p.liveNote){
        lines.push({text:`${p.label}: live`, status:'fresh'});
      } else {
        lines.push({text:`${p.label}${age?' \xb7 '+age:''}`, status:s||'unknown'});
      }
    }
  } else if(node.type==='store'){
    let found=false;
    for(const app of statusData.apps){
      for(const p of app.pipelines){
        if(p.r2Key===node.r2Key){
          const s=pipelineStatus(p);
          const age=p.r2?.lastModified?fmtAge(p.r2.lastModified):null;
          lines.push({text:age?`Last updated ${age}`:'No data',status:s||'unknown'});
          if(p.r2?.lastModified) lines.push({text:`Modified: ${new Date(p.r2.lastModified).toLocaleDateString()}`,status:s||'unknown'});
          found=true; break;
        }
      }
      if(found) break;
    }
    if(!lines.length) lines.push({text:'No status data',status:'unknown'});
  } else if(node.type==='process'){
    const lj=node.localJobId?findLocalJob(node.localJobId):null;
    if(lj){
      const s = lj.lastExitCode===0 ? 'fresh' : 'error';
      lines.push({text:`${lj.label}${lj.lastRunAt?' \xb7 '+fmtAge(lj.lastRunAt):''}`,status:s});
      if(lj.nextRunAt) lines.push({text:'Next: '+fmtRelTime(lj.nextRunAt),status:'fresh'});
    } else {
      lines.push({text:'No local job data',status:'unknown'});
    }
  }
  return lines.length?lines:[{text:'No status data',status:'unknown'}];
}

document.addEventListener('click', ()=> document.getElementById('status-tip').classList.remove('visible'));

// \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501
// INIT
// \u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501
document.getElementById('drill-back').addEventListener('click', closeDrill);
document.getElementById('panel-close').addEventListener('click', closePanel);
document.getElementById('refresh-btn').addEventListener('click', loadStatus);

renderDFD();
loadStatus();
</script>

name: Fetch TIPS Reference Data

on:
  schedule:
    - cron: '0 14 * * 1'   # Every Monday at 14:00 UTC (10am ET)
  workflow_dispatch:         # Manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch TIPS reference data
        run: node fetchTipsRef.js

      - name: Commit data/TipsRef.csv if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/TipsRef.csv
          git diff --cached --quiet || git commit -m "chore: update TipsRef.csv [skip ci]"
          git pull --rebase origin main
          git push

name: Fetch TIPS Reference Data

on:
  schedule:
    - cron: '0 14 * * 1'   # Every Monday at 14:00 UTC (10am ET)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch TIPS reference data
        run: node fetchTipsRef.js

      - name: Upload to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler r2 object put data/TIPS/TipsRef.csv --file data/TipsRef.csv --content-type text/csv

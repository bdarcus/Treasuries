name: Get TIPS Yields

# FedInvest publishes prices once daily at ~1pm ET, Mon-Fri (non-holidays).
# ET = UTC-5 (EST) or UTC-4 (EDT); both hours covered below.

on:
  schedule:
    - cron: '0 17 * * 1-5'   # 1:00 PM EDT (UTC-4)
    - cron: '0 18 * * 1-5'   # 1:00 PM EST (UTC-5)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get TIPS yields
        run: node getTipsYields.js

      - name: Upload to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler r2 object put data/TIPS/TipsYields.csv --file data/TipsYields.csv --content-type text/csv --remote

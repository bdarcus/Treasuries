name: Fetch Reference CPI

on:
  schedule:
    - cron: '0 15 12 * *'   # 12th of each month at 15:00 UTC (BLS publishes ~mid-month)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch reference CPI data
        run: node fetchRefCpi.js --write

      - name: Commit data/RefCPI.csv if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/RefCPI.csv
          git diff --cached --quiet || git commit -m "chore: update RefCPI.csv [skip ci]"
          git pull --rebase origin main
          git push

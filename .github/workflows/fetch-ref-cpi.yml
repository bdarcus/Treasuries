name: Fetch Reference CPI

on:
  schedule:
    - cron: '35 13 13 1 *'  # Jan 13 at 8:35 AM EST
    - cron: '35 13 13 2 *'  # Feb 13 at 8:35 AM EST
    - cron: '35 12 11 3 *'  # Mar 11 at 8:35 AM EDT
    - cron: '35 12 10 4 *'  # Apr 10 at 8:35 AM EDT
    - cron: '35 12 12 5 *'  # May 12 at 8:35 AM EDT
    - cron: '35 12 10 6 *'  # Jun 10 at 8:35 AM EDT
    - cron: '35 12 14 7 *'  # Jul 14 at 8:35 AM EDT
    - cron: '35 12 12 8 *'  # Aug 12 at 8:35 AM EDT
    - cron: '35 12 11 9 *'  # Sep 11 at 8:35 AM EDT
    - cron: '35 12 14 10 *' # Oct 14 at 8:35 AM EDT
    - cron: '35 13 10 11 *' # Nov 10 at 8:35 AM EST
    - cron: '35 13 10 12 *' # Dec 10 at 8:35 AM EST
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Fetch reference CPI data
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: node scripts/fetchRefCpi.js --write

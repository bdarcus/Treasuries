name: Fetch Reference CPI

on:
  schedule:
    - cron: '0 15 12 * *'   # 12th of each month at 15:00 UTC
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch reference CPI data
        run: node fetchRefCpi.js --write

      - name: Upload to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler r2 object put data/TIPS/RefCPI.csv --file data/RefCPI.csv --content-type text/csv

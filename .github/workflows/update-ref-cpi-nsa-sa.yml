name: Update Reference CPI (NSA/SA)

on:
  workflow_dispatch: # Allows manual trigger for testing
  schedule:
    # Runs daily at 13:35 UTC (8:35 AM ET)
    # This covers 8:30 AM ET releases with a 5-minute buffer
    - cron: '35 13 * * *'

jobs:
  update-cpi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Check if today is a CPI Release Day
        # If it's manual trigger (workflow_dispatch), skip the check and run anyway
        if: github.event_name != 'workflow_dispatch'
        run: node TipsSA/scripts/checkReleaseDate.js

      - name: Run Update Script
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: node TipsSA/scripts/updateRefCpi.js
